<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freibadstatus – Widget</title>
  <style>
    :root{
      --bg:#ffffff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
      --ok:#16a34a; --warn:#ca8a04; --closed:#475569;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f8fafc;padding:24px;color:var(--text)}
    .widget{
      max-width:640px;background:var(--bg);border:1px solid var(--border);border-radius:20px;
      box-shadow:0 8px 24px rgba(15,23,42,.05);overflow:hidden
    }
    .head{padding:20px 20px 10px 20px}
    .title{font-size:24px;font-weight:700}
    .sub{font-size:14px;color:var(--muted);margin-top:4px}
    .body{padding:10px 20px 20px 20px}
    .statusbox{display:flex;align-items:center;gap:12px;border:1px solid var(--border);border-radius:16px;padding:16px}
    .dot{width:14px;height:14px;border-radius:50%}
    .status{font-weight:700}
    .note{margin-top:4px;color:var(--muted)}
    .hours{margin-top:14px;font-size:14px}
    .updated{margin-top:14px;font-size:12px;color:var(--muted)}
    .hint{margin-top:20px;font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="widget">
    <div class="head">
      <div class="title">Pielachtalbad Rabenstein</div>
      <div class="sub">Aktueller Bade-Status</div>
    </div>
    <div class="body">
      <div class="statusbox">
        <div id="dot" class="dot"></div>
        <div>
          <div id="status" class="status"></div>
          <div id="note" class="note"></div>
        </div>
      </div>
      <div id="hours" class="hours"></div>
      <div id="updated" class="updated"></div>
      <div class="hint">Testversion: lädt den Status aus dem gleichen Browser-Speicher wie die Admin-Seite.</div>
    </div>
  </div>

<script>
  const KEY = "rabenstein_freibad_status_shared_v1";

  function loadData(){
    try{
      return JSON.parse(localStorage.getItem(KEY)) || {
        status:"geschlossen",
        note:"Heute kein Badebetrieb.",
        hours:"Täglich 09:00–19:00 Uhr",
        showHours:true,
        updatedAt:new Date().toISOString()
      };
    }catch(e){
      return {
        status:"geschlossen",
        note:"Heute kein Badebetrieb.",
        hours:"Täglich 09:00–19:00 Uhr",
        showHours:true,
        updatedAt:new Date().toISOString()
      };
    }
  }

  function statusMeta(status){
    if(status === "geoeffnet") return {label:"Geöffnet", color:"#16a34a"};
    if(status === "wetterbedingt") return {label:"Wetterbedingt geschlossen", color:"#ca8a04"};
    return {label:"Geschlossen", color:"#475569"};
  }

  function formatDate(iso){
    try{
      return new Intl.DateTimeFormat("de-AT", {dateStyle:"medium", timeStyle:"short"}).format(new Date(iso));
    }catch(e){
      return iso;
    }
  }

  function render(){
    const data = loadData();
    const meta = statusMeta(data.status);
    document.getElementById("dot").style.background = meta.color;
    document.getElementById("status").textContent = meta.label;
    document.getElementById("note").textContent = data.note || "";
    document.getElementById("hours").textContent = data.showHours ? data.hours : "";
    document.getElementById("updated").textContent = "Zuletzt aktualisiert: " + formatDate(data.updatedAt);
  }

  render();
  window.addEventListener("storage", render);
</script>
</body>
</html>
