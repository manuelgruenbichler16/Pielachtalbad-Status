<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freibad Status</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .box {
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 20px;
    background: #f8fafc;
  }

  .title {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 10px;
  }

  .status {
    font-size: 26px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }

  .updated {
    font-size: 12px;
    color: #64748b;
    margin-top: 12px;
  }
</style>
</head>

<body>

<div class="box">
  <div class="title">Aktueller Bade-Status</div>
  <div id="status" class="status">Lädt...</div>
  <div id="updated" class="updated"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxQW3sgI-zLsBi_mqbQHAzTc8owMGzlFQ232Sr-PA8d8LwyMW_iG08P2OAOTGxPQ_ei/exec";

function formatDate(date) {
  return new Intl.DateTimeFormat("de-AT", {
    dateStyle: "medium",
    timeStyle: "short"
  }).format(new Date(date));
}

function getStatusMeta(status) {
  if (status === "geoeffnet") return { text: "Geöffnet", color: "#16a34a" };
  if (status === "wetterbedingt") return { text: "Wetterbedingt geschlossen", color: "#ca8a04" };
  return { text: "Geschlossen", color: "#475569" };
}

async function loadStatus() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const meta = getStatusMeta(data.status);

    document.getElementById("status").innerHTML = `
      <span class="dot" style="background:${meta.color}"></span>
      ${meta.text}
    `;

    document.getElementById("updated").innerText =
      "Zuletzt aktualisiert: " + formatDate(data.updatedAt);

  } catch (e) {
    document.getElementById("status").innerText = "Fehler beim Laden";
  }
}

loadStatus();
</script>

</body>
</html>
